<!DOCTYPE html>
<html>
<head>
    <title>DocMinify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">🚀 DocMinify</h1>

    <form action="/optimize" enctype="multipart/form-data" method="post" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label class="form-label">Select file to optimize</label>
            <input class="form-control" type="file" name="file" required>
        </div>
        <button type="submit" class="btn btn-primary">Optimize</button>
    </form>

    {% if result %}
    <div class="card mt-4 p-4 shadow-sm">
        <h4>Optimization Result</h4>
        <p><strong>Original Size:</strong> {{ result.original_size }} bytes</p>
        <p><strong>Optimized Size:</strong> {{ result.optimized_size }} bytes</p>
        <p><strong>Reduction:</strong> {{ result.reduction_bytes }} bytes ({{ result.reduction_percentage }}%)</p>
        <a href="{{ download_link }}" class="btn btn-success mt-2">Download Optimized File</a>
    </div>
    {% endif %}
</div>

</body>
</html>
